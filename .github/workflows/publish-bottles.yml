name: Publish Bottles

on:
  workflow_dispatch:
    inputs:
      pull_request:
        description: "Reviewed pull request number whose bottle artifacts should be published"
        required: true
        type: string
      head_sha:
        description: "Expected reviewed pull request head commit SHA"
        required: true
        type: string

permissions:
  actions: read
  checks: read
  contents: write
  issues: read
  pull-requests: write

jobs:
  publish-bottles:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git author
        uses: Homebrew/actions/git-user-config@main

      - name: Publish reviewed bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ inputs.head_sha }}
          PULL_REQUEST: ${{ inputs.pull_request }}
        run: |
          brew pr-pull --debug \
            --tap="$GITHUB_REPOSITORY" \
            --head-sha="$HEAD_SHA" \
            "$PULL_REQUEST"

      - name: Push bottle commit
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main
